# Release pipeline: push a tag `vX.Y.Z` to publish physure to PyPI.
#
# physure-core is a pure-Rust rlib with no PyO3 bindings — it's not an
# independently installable Python package, so it is not published here.
# It has its own independent version and crates.io release flow: see
# bump-core-release.yml / core-release.yml (tags `core-vX.Y.Z`).
#
# One-time setup (repo owner):
#   1. PyPI: add a Trusted Publisher to the physure project: repo
#      Alexisrx96/physure, workflow release.yml, environment pypi.
#   2. GitHub: create the `pypi` environment (Settings -> Environments).
name: Release

on:
  push:
    tags: ["v*", "py-v*", "py-core-v*"]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Tag must match physure.__version__
        run: |
          tag="${GITHUB_REF_NAME#py-core-v}"
          tag="${tag#py-v}"
          tag="${tag#v}"
          version="$(grep -Po '(?<=__version__ = ")[^"]*' physure-python/physure/__init__.py)"
          if [ "$tag" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME (parsed $tag) does not match __version__ $version" >&2
            exit 1
          fi

  # One abi3 wheel per platform (Python >= 3.11). maturin-action builds
  # inside manylinux images on Linux so PyPI accepts the wheels — a bare
  # `uv build` on the runner would produce a rejected linux_x86_64 tag.
  wheels:
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: ubuntu-latest,  target: aarch64 }
          - { runner: macos-latest,   target: x86_64 }
          - { runner: macos-latest,   target: aarch64 }
          - { runner: windows-latest, target: x64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: physure-python
          args: --release --out dist
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: physure-dist-${{ matrix.runner }}-${{ matrix.target }}
          path: physure-python/dist

  sdist:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: physure-python
          args: --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: physure-dist-sdist
          path: physure-python/dist

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: physure-dist-*
          merge-multiple: true
          path: dist-py
      - name: Publish physure
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist-py
          skip-existing: true

  # Permanent GitHub Release pinned to the tag, with the exact artifacts
  # that went to PyPI attached.
  github-release:
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: physure-dist-*
          merge-multiple: true
          path: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "physure $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
