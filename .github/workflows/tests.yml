name: Tests & Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: physure-python
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Rust build cache
      uses: Swatinem/rust-cache@v2

    - name: Install dependencies
      run: uv sync --all-extras --dev --python 3.12

    - name: Ruff lint
      run: uv run ruff check .

    - name: Ruff format
      run: uv run ruff format --check .

  rust:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable

    - name: Rust build cache
      uses: Swatinem/rust-cache@v2

    - name: Test physure crates
      run: cargo test -p physure-core -p physure-script -p physure-cli

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: physure-python
    strategy:
      fail-fast: false
      matrix:
        # 3.11 floor: the abi3-py311 wheel requires it (pyo3 buffer API)
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Rust build cache
      uses: Swatinem/rust-cache@v2

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      # Pin to the matrix interpreter; otherwise uv resolves the newest
      # available Python and maturin links physure_core against a
      # libpython that isn't installed.
      run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

    - name: Run Tests
      # --cov enables the fail_under=80 coverage gate from pyproject.toml
      run: uv run pytest --ignore=tests/core/test_serialization.py --cov=physure

    - name: Run Benchmarks
      # Enable benchmarks explicitly since they are disabled in pyproject.toml
      run: uv run pytest --benchmark-enable tests/performance/benchmarks.py

    - name: Build Documentation
      run: uv run mkdocs build --strict
