name: Tests & Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      # Pin to the matrix interpreter; otherwise uv resolves the newest
      # available Python and maturin links measurekit_core against a
      # libpython that isn't installed.
      run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

    - name: Run Tests
      run: uv run pytest --ignore=tests/core/test_serialization.py

    - name: Run Benchmarks
      # Enable benchmarks explicitly since they are disabled in pyproject.toml
      run: uv run pytest --benchmark-enable tests/performance/benchmarks.py

    - name: Build Documentation
      run: uv run mkdocs build --strict
