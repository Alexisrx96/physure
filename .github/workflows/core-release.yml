# Release pipeline: push a tag `core-vX.Y.Z` to publish the `physure` crate (physure-core/) to crates.io.
#
# physure-core is versioned independently from the physure Python wrapper
# (see release.yml / bump-release.yml, triggered by plain `vX.Y.Z` tags).
#
# One-time setup (repo owner):
#   1. crates.io: add a Trusted Publisher to the physure crate: repo
#      Alexisrx96/physure, workflow core-release.yml, environment crates-io.
#   2. GitHub: create the `crates-io` environment (Settings -> Environments).
name: Core Release

on:
  push:
    tags: ["core-v*", "py-core-v*"]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Tag must match workspace.package.version
        run: |
          tag="${GITHUB_REF_NAME#py-core-v}"
          tag="${tag#core-v}"
          version="$(grep -Po '(?<=^version     = ")[^"]*' Cargo.toml)"
          if [ "$tag" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME (parsed $tag) does not match workspace version $version" >&2
            exit 1
          fi

  publish:
    needs: check-version
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - name: Publish physure crate
        run: cargo publish -p physure
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Permanent GitHub Release pinned to the core tag.
  github-release:
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "physure crate $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
