sonar.projectKey=physure
sonar.projectName=physure
sonar.projectVersion=1.0

sonar.sources=physure
sonar.tests=tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPaths=test-results.xml

sonar.exclusions=physure/**/__pycache__/**,physure/_generated_types.py
sonar.test.exclusions=tests/performance/**
# pytest-cov omits __init__.py (pyproject.toml [tool.coverage.run] omit) so
# coverage.xml never lists these files; tell Sonar to match, or it treats
# them as 0% covered instead of "not measured".
sonar.coverage.exclusions=physure/**/__init__.py

sonar.host.url=http://sonar.localhost
