# ===============================================
#  Archivo de Configuración Maestro para MeasureKit
# ===============================================
# Define todas las dimensiones, unidades y constantes conocidas por la librería.
# Formato de Unidad: nombre = factor_a_SI, dimension, [receta_simbolica], [simbolo, alias...]

[Settings]
default_output = plain
auto_simplify = false
default_system = SI
readable_representation = true
verbose = false

[Dimensions]
# --- Dimensiones Base ---
length = L
mass = M
time = T
electric_current = I
temperature = O
amount_of_substance = N
luminous_intensity = J
angle = A, noprefix
money = $, noprefix
# --- Dimensiones derivadas ---
area = L^2
volume = L^3
frequency = T^-1
velocity = L*T^-1
acceleration = L*T^-2
force = M*L*T^-2
pressure = M*L^-1*T^-2
energy = M*L^2*T^-2
power = M*L^2*T^-3
electric_charge = I*T

[Prefixes]
# Formato: nombre = simbolo, factor
yotta = Y, 1e24
zetta = Z, 1e21
exa = E, 1e18
peta = P, 1e15
tera = T, 1e12
giga = G, 1e9
mega = M, 1e6
kilo = k, 1e3
hecto = h, 100
deca = da, 10
deci = d, 0.1
centi = c, 0.01
milli = m, 1e-3
micro = u, 1e-6
nano = n, 1e-9
pico = p, 1e-12
femto = f, 1e-15
atto = a, 1e-18
zepto = z, 1e-21
yocto = y, 1e-24

[Units]
# Formato: nombre_descriptivo = factor_a_base_SI, dimension, [receta], [simbolo, alias...]
# --- Unidades Base SI ---
meter = 1.0, L, [m, meter, metro, metros]
kilogram = 1.0, M, [kg, kilogram, kilogramo, kilogramos]
second = 1.0, T, [s, second, segundo, segundos]
ampere = 1.0, I, [A, ampere, amperio]
kelvin = 1.0, O, [K, kelvin]
mole = 1.0, N, [mol]
candela = 1.0, J, [cd, candela]
radian = 1.0, A, [rad, radian, radianes]

# --- Moneda (Base) ---
USD = 1.0, $, [USD, dollar, dollars]

# --- Unidades de Longitud ---
foot = 0.3048, L, [ft, foot, pie, pies]
inch = 0.0254, L, [in, inch, pulgada]
mile = 1609.34, L, [mi, mile, milla]
yard = 0.9144, L, [yd, yard, yarda]

# --- Unidades de Masa ---
gram = 0.001, M, [g, gram, gramo]
pound = 0.453592, M, [lb, pound, libra, lbs]
ounce = 0.0283495, M, [oz, ounce, onza]

# --- Unidades de Tiempo ---
minute = 60.0, T, [min, minute, minuto]
hour = 3600.0, T, [h, hour, hora]
day = 86400.0, T, [d, day, dia]

# --- Unidades de Fuerza ---
newton = 1.0, M*L*T^-2, kg*m/s^2, [N, newton]
dyne = 1e-5, M*L*T^-2, N, [dyn, dyne]
pound_force = 4.44822, M*L*T^-2, N, [lbf, pound_force]
kilopond = 9.80665, M*L*T^-2, N, [kp, kilopond]
poundal = 0.138255, M*L*T^-2, N, [pdl, poundal]

# --- Unidades de Energía ---
joule = 1.0, M*L^2*T^-2, N*m, [J, joule]
calorie = 4.184, M*L^2*T^-2, J, [cal, calorie]
electron_volt = 1.60218e-19, M*L^2*T^-2, J, [eV, electron_volt]

# --- Unidades de Potencia ---
watt = 1.0, M*L^2*T^-3, J/s, [W, watt]
horsepower = 745.7, M*L^2*T^-3, W, [hp, horsepower]

# --- Unidades de Presión ---
pascal = 1.0, M*L^-1*T^-2, N/m^2, [Pa, pascal]
atmosphere = 101325.0, M*L^-1*T^-2, Pa, [atm, atmosphere]
bar = 100000.0, M*L^-1*T^-2, Pa, [bar]
psi = 6894.76, M*L^-1*T^-2, Pa, [psi, pound_per_square_inch]
mmHg = 133.322, M*L^-1*T^-2, Pa, [mmHg, millimeter_of_mercury]
cmHg = 1333.22, M*L^-1*T^-2, Pa [cmHg, centimeter_of_mercury]

# --- Unidades Eléctricas ---
coulomb = 1.0, I*T, A*s, [C, coulomb]
volt = 1.0, M*L^2*T^-3*I^-1, W/A, [V, volt]
ohm = 1.0, M*L^2*T^-3*I^-2, V/A, [Ohm, ohm]
farad = 1.0, M^-1*L^-2*T^4*I^2, s/Ohm, [F, farad]
tesla = 1.0, M*T^-2*I^-1, Wb/m^2, [T, tesla]
weber = 1.0, M*L^2*T^-2*I^-1, V*s, [Wb, weber]

# --- Unidades de Frecuencia ---
hertz = 1.0, T^-1, 1/s, [Hz, hertz]

# --- Unidades de Ángulo ---
degree = 0.0174532925, A, rad, [deg, degree, grado]

# --- Unidades de Moneda (Derivadas) ---
EUR = 1.08, $, USD, [EUR, euro]
MXN = 0.059, $, USD, [MXN, mexican_peso]

[Constants]
# Formato: nombre = valor unidad
speed_of_light = 299792458 m/s
planck_constant = 6.62607015e-34 J*s
gravitational_constant = 6.67430e-11 N*m^2/kg^2
standard_gravity = 9.80665 m/s^2
pi = 3.141592653589793 1
e = 2.718281828459045 1
