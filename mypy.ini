[mypy]
python_version = 3.10
plugins = measurekit.static.mypy_plugin
check_untyped_defs = True
disallow_untyped_defs = True
warn_return_any = True
warn_unused_configs = True

# Skip heavy packages
[mypy-torch.*]
ignore_missing_imports = True

[mypy-jax.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True
