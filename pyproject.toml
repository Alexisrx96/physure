[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "measurekit"
version = "0.0.3-dev"
description = "High-performance physical dimension handling and unit conversion engine with multi-backend support."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Irvin Torres", email = "irvinrx1996@hotmail.com" }
]
keywords = [
    "units", "measurement", "conversion", "physics", "engineering", 
    "science", "dimensional-analysis", "vectorization", "uncertainty"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "sympy>=1.13.0",
    "typing-extensions>=4.15.0",
]

[project.optional-dependencies]
numpy = ["numpy>=1.26.0", "scipy>=1.12.0", "numba>=0.59.0"]
torch = ["torch>=2.2.0"]
jax = ["jax>=0.4.25", "jaxlib>=0.4.25"]
pandas = ["pandas>=2.2.0"]
pydantic = ["pydantic>=2.6.0"]
all = [
    "numpy>=1.26.0",
    "scipy>=1.12.0",
    "numba>=0.59.0",
    "torch>=2.2.0",
    "jax>=0.4.25",
    "jaxlib>=0.4.25",
    "pandas>=2.2.0",
    "pydantic>=2.6.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-benchmark>=4.0.0",
    "hypothesis>=6.98.0",
    "mypy>=1.9.0",
    "ruff>=0.3.0",
]
docs = [
    "sphinx>=7.2.0",
    "sphinx-rtd-theme>=2.0.0",
]

[project.urls]
"Homepage" = "https://github.com/Alexisrx96/measurekit"
"Bug Reports" = "https://github.com/Alexisrx96/measurekit/issues"
"Source" = "https://github.com/Alexisrx96/measurekit"
"Documentation" = "https://measurekit.readthedocs.io/"

[tool.hatch.build.targets.wheel]
packages = ["measurekit"]

[tool.uv]
managed = true
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-benchmark>=4.0.0",
    "hypothesis>=6.98.0",
    "mypy>=1.9.0",
    "ruff>=0.3.0",
]

[tool.ruff]
line-length = 79
target-version = "py310"
exclude = [
    ".ruff_cache",
    "__pycache__",
    "*.ipynb",
    "manual_sandbox/*",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E", "F", "UP", "B", "SIM", "I", "N", "RUF", "TCH", 
    "D", "C4", "T20", "PYI", "PT", "RET"
]
ignore = ["D100", "D104"]
fixable = ["ALL"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["measurekit"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]
"tests/*" = ["D", "S101"]
"manual_sandbox/*" = ["ALL"]

[tool.ruff.format]
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --benchmark-disable"

[tool.coverage.run]
source = ["measurekit"]
branch = true
omit = [
    "**/__init__.py",
    "tests/*",
    "manual_sandbox/*",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "measurekit.tests.*"
ignore_errors = true
