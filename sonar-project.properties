sonar.projectKey=measurekit
sonar.projectName=measurekit
sonar.projectVersion=1.0

sonar.sources=measurekit,measurekit_core/src
sonar.tests=tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPaths=test-results.xml
sonar.rust.lcov.reportPaths=measurekit_core/lcov.info

sonar.exclusions=measurekit/**/__pycache__/**,measurekit/_generated_types.py,measurekit_core/target/**
sonar.test.exclusions=tests/performance/**

sonar.host.url=http://localhost:9000
